name: Deploy to DotNS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install and build
        run: |
          cd frontend
          bun install
          bun run build

      - name: Download ethers.js UMD bundle
        run: curl -sL -o dist/vendor/ethers.umd.min.js "https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.4/ethers.umd.min.js"

      - name: Setup IPFS
        uses: ipfs/download-ipfs-distribution-action@v1
        with:
          name: kubo
          version: v0.33.0
      - run: ipfs init

      - name: Install deploy tool
        run: npm install -g bulletin-deploy ws

      - name: Deploy
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          command: bulletin-deploy './dist' 'gagged.dot'
        env:
          MNEMONIC: ${{ secrets.DOTNS_MNEMONIC }}
          NODE_OPTIONS: '--max-old-space-size=8192'
